name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Create Release
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          # Find and select the latest Xcode 16 or 15 available on the runner
          XCODE_PATH=""
          for xcode in $(ls -d /Applications/Xcode_16*.app /Applications/Xcode_15*.app 2>/dev/null | sort -V -r); do
            if [ -d "$xcode" ]; then
              XCODE_PATH="$xcode"
              break
            fi
          done
          
          if [ -n "$XCODE_PATH" ]; then
            echo "Selecting Xcode: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          else
            echo "⚠️ No Xcode 16 or 15 app bundle found in /Applications"
          fi
          xcodebuild -version
          swift --version

      - name: Build & Package Universal App DMG
        run: |
          # Extract version from tag (e.g., v1.1.0 -> 1.1.0)
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Building version: $VERSION"
          
          # Run build script to compile universal binary and generate App Icon
          chmod +x build.sh
          VERSION="$VERSION" ./build.sh
          
          # Package into a styled DMG with background using appdmg
          npx appdmg appdmg.json FreeSizeUp-Universal.dmg

      - name: Package Single-Arch DMGs
        run: |
          # ARM64 (Apple Silicon) DMG
          cp -R FreeSizeUp.app FreeSizeUp-ARM64.app
          cp .build/arm64-apple-macosx/release/FreeSizeUp FreeSizeUp-ARM64.app/Contents/MacOS/FreeSizeUp
          mv FreeSizeUp.app FreeSizeUp-Universal.app
          mv FreeSizeUp-ARM64.app FreeSizeUp.app
          npx appdmg appdmg.json FreeSizeUp-ARM64.dmg
          mv FreeSizeUp.app FreeSizeUp-ARM64.app

          # Intel x86_64 DMG
          cp -R FreeSizeUp-Universal.app FreeSizeUp-Intel.app
          cp .build/x86_64-apple-macosx/release/FreeSizeUp FreeSizeUp-Intel.app/Contents/MacOS/FreeSizeUp
          mv FreeSizeUp-Intel.app FreeSizeUp.app
          npx appdmg appdmg.json FreeSizeUp-Intel.dmg
          
          # Restore universal app
          rm -rf FreeSizeUp.app FreeSizeUp-ARM64.app
          mv FreeSizeUp-Universal.app FreeSizeUp.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            FreeSizeUp-Universal.dmg
            FreeSizeUp-ARM64.dmg
            FreeSizeUp-Intel.dmg
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
