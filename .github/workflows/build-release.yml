name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Create Release
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          # Find and select the latest Xcode 16 or 15 available on the runner
          XCODE_PATH=""
          for xcode in $(ls -d /Applications/Xcode_16*.app /Applications/Xcode_15*.app 2>/dev/null | sort -V -r); do
            if [ -d "$xcode" ]; then
              XCODE_PATH="$xcode"
              break
            fi
          done
          
          if [ -n "$XCODE_PATH" ]; then
            echo "Selecting Xcode: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          else
            echo "⚠️ No Xcode 16 or 15 app bundle found in /Applications"
          fi
          xcodebuild -version
          swift --version

      - name: Build & Package Universal App DMG
        run: |
          # Extract version from tag (e.g., v1.1.0 -> 1.1.0)
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Building version: $VERSION"
          
          # Run build script to compile universal binary and generate App Icon
          chmod +x build.sh
          VERSION="$VERSION" ./build.sh
          
          # Package into a Universal DMG
          mkdir -p dist-universal
          cp -R FreeSizeUp.app dist-universal/
          ln -s /Applications dist-universal/Applications
          hdiutil create -volname "FreeSizeUp Installer" -srcfolder dist-universal -ov -format UDZO FreeSizeUp-Universal.dmg
          rm -rf dist-universal

      - name: Package Single-Arch DMGs
        run: |
          # ARM64 (Apple Silicon) DMG
          cp -R FreeSizeUp.app FreeSizeUp-ARM64.app
          cp .build/arm64-apple-macosx/release/FreeSizeUp FreeSizeUp-ARM64.app/Contents/MacOS/FreeSizeUp
          mkdir -p dist-arm64
          cp -R FreeSizeUp-ARM64.app dist-arm64/FreeSizeUp.app
          ln -s /Applications dist-arm64/Applications
          hdiutil create -volname "FreeSizeUp ARM64" -srcfolder dist-arm64 -ov -format UDZO FreeSizeUp-ARM64.dmg
          rm -rf dist-arm64 FreeSizeUp-ARM64.app

          # Intel x86_64 DMG
          cp -R FreeSizeUp.app FreeSizeUp-Intel.app
          cp .build/x86_64-apple-macosx/release/FreeSizeUp FreeSizeUp-Intel.app/Contents/MacOS/FreeSizeUp
          mkdir -p dist-intel
          cp -R FreeSizeUp-Intel.app dist-intel/FreeSizeUp.app
          ln -s /Applications dist-intel/Applications
          hdiutil create -volname "FreeSizeUp Intel" -srcfolder dist-intel -ov -format UDZO FreeSizeUp-Intel.dmg
          rm -rf dist-intel FreeSizeUp-Intel.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            FreeSizeUp-Universal.dmg
            FreeSizeUp-ARM64.dmg
            FreeSizeUp-Intel.dmg
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
